name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  ECR_REGISTRY: 932705495654.dkr.ecr.eu-central-1.amazonaws.com
  ECR_REPOSITORY: spacetoon-pocket
  EC2_HOST: 54.93.172.83

jobs:
  # ═══════════════════════════════════════════════════════════════
  #  Job 1: Build & Lint (runs on every push and PR)
  # ═══════════════════════════════════════════════════════════════
  build:
    name: Build & Lint
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install dependencies
      run: npm ci --legacy-peer-deps

    - name: Generate Prisma Client
      run: npx prisma generate

    - name: Run Build
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
        JWT_SECRET: ${{ secrets.JWT_SECRET }}
      run: npm run build

    - name: Run Linter
      run: npm run lint || true  # Don't fail on lint warnings

  # ═══════════════════════════════════════════════════════════════
  #  Job 2: Deploy to AWS (only on push to main, after build)
  # ═══════════════════════════════════════════════════════════════
  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: eu-central-1

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build & Push Docker image
      run: |
        docker build --platform linux/amd64 \
          --build-arg DATABASE_URL="${{ secrets.DATABASE_URL }}" \
          --build-arg JWT_SECRET="${{ secrets.JWT_SECRET }}" \
          --build-arg GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
          -t $ECR_REGISTRY/$ECR_REPOSITORY:latest -t $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }} .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}

    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ env.EC2_HOST }}
        username: ec2-user
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          set -e
          
          # Configure AWS CLI on the EC2 instance temporarily
          export AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
          export AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
          export AWS_DEFAULT_REGION=eu-central-1

          # Login to ECR
          aws ecr get-login-password | sudo docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}

          # Pull latest image
          sudo docker pull ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest

          # Stop and remove old container
          sudo docker stop spacetoon-pocket 2>/dev/null || true
          sudo docker rm spacetoon-pocket 2>/dev/null || true

          # Run new container
          sudo docker run -d \
            --name spacetoon-pocket \
            --restart always \
            -p 3000:3000 \
            -e "DATABASE_URL=${{ secrets.DATABASE_URL }}" \
            -e "DIRECT_URL=${{ secrets.DATABASE_URL }}" \
            -e "JWT_SECRET=${{ secrets.JWT_SECRET }}" \
            -e "VAPID_PRIVATE_KEY=${{ secrets.VAPID_PRIVATE_KEY }}" \
            -e "NEXT_PUBLIC_VAPID_PUBLIC_KEY=${{ secrets.VAPID_PUBLIC_KEY }}" \
            -e "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" \
            -e "COOKIE_SECURE=true" \
            --log-opt max-size=10m \
            --log-opt max-file=3 \
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest

          # Apply schema changes securely in production (non-interactive)
          sleep 5
          sudo docker exec spacetoon-pocket npx prisma migrate deploy 2>&1 || echo "⚠️ Prisma migrate deploy failed"

          # Verify container is running
          sleep 3
          sudo docker logs spacetoon-pocket --tail 5

    - name: Health Check
      run: |
        sleep 10
        curl -sf http://${{ env.EC2_HOST }}:3000/ -o /dev/null -w "%{http_code}" || echo "⚠️ Health check returned non-zero (may need time to warm up)"

