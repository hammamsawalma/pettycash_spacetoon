name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  ECR_REGISTRY: 932705495654.dkr.ecr.eu-central-1.amazonaws.com
  ECR_REPOSITORY: spacetoon-pocket
  EC2_HOST: 54.93.172.83

jobs:
  # ═══════════════════════════════════════════════════════════════
  #  Job 1: Build & Lint (runs on every push and PR)
  # ═══════════════════════════════════════════════════════════════
  build:
    name: Build & Lint
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install dependencies
      run: npm ci --legacy-peer-deps

    - name: Generate Prisma Client
      run: npx prisma generate

    - name: Run Build
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
        JWT_SECRET: ${{ secrets.JWT_SECRET }}
      run: npm run build

    - name: Run Linter
      run: npm run lint || true  # Don't fail on lint warnings

  # ═══════════════════════════════════════════════════════════════
  #  Job 2: Deploy to AWS (only on push to main, after build)
  # ═══════════════════════════════════════════════════════════════
  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: eu-central-1

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build & Push Docker image
      run: |
        docker build --platform linux/amd64 \
          --build-arg DATABASE_URL="${{ secrets.DATABASE_URL }}" \
          --build-arg JWT_SECRET="${{ secrets.JWT_SECRET }}" \
          --build-arg GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
          -t $ECR_REGISTRY/$ECR_REPOSITORY:latest -t $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }} .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}

    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1
      env:
        DB_URL_SECRET: ${{ secrets.DATABASE_URL }}
        JWT_SECRET_KEY: ${{ secrets.JWT_SECRET }}
        VAPID_PRIV_SECRET: ${{ secrets.VAPID_PRIVATE_KEY }}
        VAPID_PUB_SECRET: ${{ secrets.VAPID_PUBLIC_KEY }}
      with:
        host: ${{ env.EC2_HOST }}
        username: ec2-user
        key: ${{ secrets.EC2_SSH_KEY }}
        envs: DB_URL_SECRET,JWT_SECRET_KEY,VAPID_PRIV_SECRET,VAPID_PUB_SECRET
        script: |
          set -e
          
          # Configure AWS CLI on the EC2 instance temporarily using the safely injected env vars
          export AWS_DEFAULT_REGION=eu-central-1

          # Login to ECR
          aws ecr get-login-password | sudo docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}

          # Pull latest image
          sudo docker pull ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest

          # ══════════════════════════════════════════════════════════
          # PRIMARY: GitHub Secrets (passed securely via the envs block)
          # GEMINI KEY: Read directly from server file to avoid SSH drops
          # ══════════════════════════════════════════════════════════
          ENV_FILE="/home/ec2-user/.env.production"

          # Safely assign safely injected environment variables
          DB_URL="$DB_URL_SECRET"
          JWT="$JWT_SECRET_KEY"
          VAPID_PRIV="$VAPID_PRIV_SECRET"
          VAPID_PUB="$VAPID_PUB_SECRET"
          
          # FORCED LOCAL EXTRACTION: GEMINI_API_KEY has characters that Appleboy/SSH hates.
          # We extract it directly from the validated file on the server.
          GEMINI=$(grep '^GEMINI_API_KEY=' "$ENV_FILE" | cut -d= -f2-)

          # Fallback for ANY empty var: Read from server file
          if [ -f "$ENV_FILE" ]; then
            [ -z "$DB_URL" ] && DB_URL=$(grep '^DATABASE_URL=' "$ENV_FILE" | cut -d= -f2-)
            [ -z "$JWT" ] && JWT=$(grep '^JWT_SECRET=' "$ENV_FILE" | cut -d= -f2-)
            [ -z "$VAPID_PRIV" ] && VAPID_PRIV=$(grep '^VAPID_PRIVATE_KEY=' "$ENV_FILE" | cut -d= -f2-)
            [ -z "$VAPID_PUB" ] && VAPID_PUB=$(grep '^NEXT_PUBLIC_VAPID_PUBLIC_KEY=' "$ENV_FILE" | cut -d= -f2-)
          fi

          # Final validation
          if [ -z "$DB_URL" ] || [ -z "$JWT" ] || [ -z "$GEMINI" ]; then
            echo "❌ FATAL: Missing critical env vars!"
            echo "  DATABASE_URL: $([ -n "$DB_URL" ] && echo 'OK' || echo 'MISSING')"
            echo "  JWT_SECRET: $([ -n "$JWT" ] && echo 'OK' || echo 'MISSING')"
            echo "  GEMINI_API_KEY: $([ -n "$GEMINI" ] && echo 'OK' || echo 'MISSING')"
            exit 1
          fi

          echo "✅ All env vars loaded. GEMINI: ${#GEMINI} chars"

          # Stop and remove old container
          sudo docker stop spacetoon-pocket 2>/dev/null || true
          sudo docker rm spacetoon-pocket 2>/dev/null || true

          # Run new container
          sudo docker run -d \
            --name spacetoon-pocket \
            --restart always \
            -p 3000:3000 \
            -e DATABASE_URL="$DB_URL" \
            -e DIRECT_URL="$DB_URL" \
            -e JWT_SECRET="$JWT" \
            -e VAPID_PRIVATE_KEY="$VAPID_PRIV" \
            -e NEXT_PUBLIC_VAPID_PUBLIC_KEY="$VAPID_PUB" \
            -e GEMINI_API_KEY="$GEMINI" \
            -e COOKIE_SECURE=true \
            --log-opt max-size=10m \
            --log-opt max-file=3 \
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest

          # Apply schema changes
          sleep 5
          sudo docker exec spacetoon-pocket npx prisma migrate deploy 2>&1 || echo "⚠️ Prisma migrate deploy failed"

          # Verify container
          sleep 3
          sudo docker logs spacetoon-pocket --tail 5

    - name: Health Check
      run: |
        sleep 10
        curl -sf http://${{ env.EC2_HOST }}:3000/ -o /dev/null -w "%{http_code}" || echo "⚠️ Health check returned non-zero (may need time to warm up)"

    - name: Verify Critical Environment Variables
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ env.EC2_HOST }}
        username: ec2-user
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          echo "🔍 Verifying critical environment variables..."
          GEMINI=$(sudo docker exec spacetoon-pocket printenv GEMINI_API_KEY 2>/dev/null || echo "")
          if [ -z "$GEMINI" ]; then
            echo "❌ FATAL: GEMINI_API_KEY is missing from the container!"
            echo "   → Check GitHub Secrets → Settings → Secrets → GEMINI_API_KEY"
            exit 1
          fi
          echo "✅ GEMINI_API_KEY is set (${#GEMINI} chars)"
          echo "✅ All critical environment variables verified."

