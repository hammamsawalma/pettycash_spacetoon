name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  ECR_REGISTRY: 932705495654.dkr.ecr.eu-central-1.amazonaws.com
  ECR_REPOSITORY: spacetoon-pocket
  EC2_HOST: 54.93.172.83

jobs:
  # ═══════════════════════════════════════════════════════════════
  #  Job 1: Build & Lint (runs on every push and PR)
  # ═══════════════════════════════════════════════════════════════
  build:
    name: Build & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: project-manager

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: project-manager/package-lock.json

    - name: Install dependencies
      run: npm ci --legacy-peer-deps

    - name: Generate Prisma Client
      run: npx prisma generate

    - name: Run Build
      run: npm run build

    - name: Run Linter
      run: npm run lint || true

  # ═══════════════════════════════════════════════════════════════
  #  Job 2: Deploy to AWS (only on push to main, after build)
  # ═══════════════════════════════════════════════════════════════
  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: eu-central-1

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build & Push Docker image
      working-directory: project-manager
      run: |
        docker build --platform linux/amd64 -t $ECR_REGISTRY/$ECR_REPOSITORY:latest -t $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }} .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}

    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1
      env:
        DB_URL_SECRET: ${{ secrets.DATABASE_URL }}
        JWT_SECRET_KEY: ${{ secrets.JWT_SECRET }}
        VAPID_PRIV_SECRET: ${{ secrets.VAPID_PRIVATE_KEY }}
        VAPID_PUB_SECRET: ${{ secrets.VAPID_PUBLIC_KEY }}
      with:
        host: ${{ env.EC2_HOST }}
        username: ec2-user
        key: ${{ secrets.EC2_SSH_KEY }}
        envs: DB_URL_SECRET,JWT_SECRET_KEY,VAPID_PRIV_SECRET,VAPID_PUB_SECRET
        script: |
          set -e
          
          # Login to ECR
          aws ecr get-login-password --region eu-central-1 | sudo docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}

          # Pull latest image
          sudo docker pull ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest

          # Stop and remove old container
          sudo docker stop spacetoon-pocket 2>/dev/null || true
          sudo docker rm spacetoon-pocket 2>/dev/null || true

          # Run new container natively using the production environment file
          sudo docker run -d \
            --name spacetoon-pocket \
            --restart always \
            -p 3000:3000 \
            --env-file /home/ec2-user/.env.production \
            --log-opt max-size=10m \
            --log-opt max-file=3 \
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest

          # Apply schema changes
          sleep 5
          sudo docker exec spacetoon-pocket npx prisma migrate deploy 2>&1 || echo "⚠️ Prisma migrate deploy failed"

          # Verify container
          sleep 3
          sudo docker logs spacetoon-pocket --tail 3

    - name: Health Check
      run: |
        sleep 10
        curl -sf https://54.93.172.83.nip.io/api/push/vapid || echo "⚠️ Health check needs time to warm up"
